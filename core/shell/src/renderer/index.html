<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP is applied via HTTP header from the main process
      (core/shell/src/main/security.ts). It's NOT declared here because:
        1. `frame-ancestors` is ignored when delivered via <meta>, and
        2. In dev we need to allow Vite's inline HMR preamble, which a
           compile-time <meta> can't conditionally relax.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vibe-ctl</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./entry.client.tsx"></script>
  </body>
</html>
