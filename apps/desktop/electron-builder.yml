appId: dev.vibe-ctl.app
productName: vibe-ctl
directories:
  output: release
  buildResources: resources
extraResources:
  - from: resources/plugins
    to: plugins
    filter: ['**/*']
  - from: resources/icons
    to: icons
    filter: ['**/*']
files:
  - '!**/node_modules/**'
  - '../../core/shell/out/**'
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
